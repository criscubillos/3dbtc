<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Crypto Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: linear-gradient(180deg, rgba(10,10,20,0.95) 0%, rgba(10,10,20,0.8) 100%);
    border-bottom: 1px solid rgba(0,255,255,0.15);
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 20px;
    background: linear-gradient(90deg, #00ffff, #ff0088);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-right: 30px;
    text-shadow: 0 0 20px rgba(0,255,255,0.3);
    white-space: nowrap;
  }

  .price-ticker {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-right: 30px;
  }

  .price-ticker .symbol {
    color: #f7931a;
    font-weight: bold;
    font-size: 14px;
  }

  .price-ticker .price {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #00ff88;
    text-shadow: 0 0 15px rgba(0,255,136,0.5);
  }

  .price-ticker .price.down {
    color: #ff0044;
    text-shadow: 0 0 15px rgba(255,0,68,0.5);
  }

  .price-ticker .change {
    font-size: 13px;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .price-ticker .change.up {
    color: #00ff88;
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.2);
  }

  .price-ticker .change.down {
    color: #ff0044;
    background: rgba(255,0,68,0.1);
    border: 1px solid rgba(255,0,68,0.2);
  }

  .timeframe-selector {
    display: flex;
    gap: 4px;
    margin-left: auto;
    margin-right: 20px;
  }

  .timeframe-selector button {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,255,255,0.15);
    color: #8899aa;
    padding: 6px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .timeframe-selector button:hover {
    background: rgba(0,255,255,0.1);
    color: #00ffff;
    border-color: rgba(0,255,255,0.4);
  }

  .timeframe-selector button.active {
    background: rgba(0,255,255,0.15);
    color: #00ffff;
    border-color: #00ffff;
    box-shadow: 0 0 10px rgba(0,255,255,0.2);
  }

  #sidebar {
    position: fixed;
    top: 60px;
    right: 0;
    width: 200px;
    bottom: 0;
    background: linear-gradient(180deg, rgba(10,10,20,0.9) 0%, rgba(10,10,20,0.7) 100%);
    border-left: 1px solid rgba(0,255,255,0.1);
    z-index: 99;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
    backdrop-filter: blur(10px);
  }

  .stats-panel { width: 100%; padding: 0 15px; }
  .stats-title { font-family: 'Orbitron'; font-size: 11px; color: rgba(0,255,255,0.4); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; text-align: center; border-bottom: 1px solid rgba(0,255,255,0.1); padding-bottom: 8px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }
  .stat-val { font-family: 'Orbitron'; font-size: 12px; color: rgba(255,255,255,0.7); }
  .stat-val.green { color: #00ff88; }
  .stat-val.red { color: #ff0044; }
  .stat-val.cyan { color: #00ffff; }

  .spread-panel { width: 100%; padding: 0 15px; margin-top: 20px; }
  .spread-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .spread-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00ffff); border-radius: 2px; transition: width 0.3s; width: 50%; }

  #canvas-container {
    position: fixed;
    top: 60px;
    left: 0;
    right: 200px;
    bottom: 0;
  }

  #canvas-container canvas {
    width: 100% !important;
    height: 100% !important;
  }

  #loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
  }

  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loader-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    color: #00ffff;
    text-shadow: 0 0 20px rgba(0,255,255,0.5);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  #indicator-overlay {
    position: fixed;
    top: 68px;
    left: 10px;
    z-index: 100;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
    pointer-events: none;
  }

  #indicator-overlay .ind-label {
    color: rgba(255, 255, 255, 0.45);
  }

  #indicator-overlay .ind-ema {
    color: #ff8800;
    text-shadow: 0 0 6px rgba(255, 136, 0, 0.4);
  }

  #indicator-overlay .ind-value {
    color: #ff8800;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    text-shadow: 0 0 6px rgba(255, 136, 0, 0.3);
  }

  /* ─── Asset Selector ─── */
  .asset-selector {
    position: relative;
    margin-right: 16px;
  }

  .asset-selector-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(0,255,255,0.2);
    color: #f7931a;
    font-family: 'Share Tech Mono', monospace;
    font-weight: bold;
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .asset-selector-btn:hover {
    background: rgba(0,255,255,0.08);
    border-color: rgba(0,255,255,0.45);
    box-shadow: 0 0 12px rgba(0,255,255,0.15);
  }

  .asset-selector-btn .arrow {
    font-size: 10px;
    color: rgba(0,255,255,0.5);
    transition: transform 0.2s;
  }

  .asset-selector.open .arrow {
    transform: rotate(180deg);
  }

  .asset-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    min-width: 220px;
    background: rgba(8, 8, 18, 0.95);
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 8px;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(0,255,255,0.05);
    z-index: 200;
    overflow: hidden;
    animation: dropIn 0.15s ease-out;
  }

  .asset-selector.open .asset-dropdown {
    display: block;
  }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .asset-dropdown input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: none;
    border-bottom: 1px solid rgba(0,255,255,0.12);
    color: #e0e0e0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    box-sizing: border-box;
  }

  .asset-dropdown input::placeholder {
    color: rgba(0,255,255,0.25);
  }

  .asset-dropdown input:focus {
    background: rgba(0,255,255,0.04);
    border-bottom-color: rgba(0,255,255,0.3);
  }

  .asset-list {
    max-height: 260px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,255,255,0.2) transparent;
  }

  .asset-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }

  .asset-item:hover {
    background: rgba(0,255,255,0.06);
    border-left-color: rgba(0,255,255,0.4);
  }

  .asset-item.active {
    background: rgba(0,255,255,0.1);
    border-left-color: #00ffff;
  }

  .asset-item .pair-symbol {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #00ffff;
    min-width: 55px;
  }

  .asset-item .pair-name {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
  }

  .asset-item.active .pair-symbol {
    text-shadow: 0 0 8px rgba(0,255,255,0.4);
  }

  .controls-hint {
    position: fixed;
    bottom: 15px;
    left: 15px;
    font-size: 11px;
    color: rgba(0,255,255,0.3);
    z-index: 100;
    line-height: 1.6;
  }

  .price-label-3d {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    text-shadow: 0 0 8px currentColor;
    line-height: 1;
  }

  .price-label-3d.last {
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(0, 255, 255, 0.5);
    color: #00ffff;
    animation: label-pulse 2s ease-in-out infinite;
  }

  .price-label-3d.last .label-price {
    font-size: 14px;
    margin-bottom: 3px;
  }

  .price-label-3d.last .label-vol {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    color: rgba(0, 255, 255, 0.6);
    text-shadow: none;
  }

  .price-label-3d.hover {
    background: rgba(0, 0, 0, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #ffffff;
    font-size: 12px;
  }

  .price-label-3d .label-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 2px;
  }

  .price-label-3d .label-row:last-child {
    margin-bottom: 0;
  }

  .price-label-3d .label-key {
    color: rgba(255,255,255,0.4);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    font-weight: 400;
  }

  .price-label-3d .label-val {
    font-family: 'Orbitron', sans-serif;
  }

  .price-label-3d .label-val.green { color: #00ff88; }
  .price-label-3d .label-val.red { color: #ff0044; }

  .price-label-3d .label-vol {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(0, 255, 255, 0.7);
  }

  @keyframes label-pulse {
    0%, 100% { border-color: rgba(0,255,255,0.3); }
    50% { border-color: rgba(0,255,255,0.8); }
  }

  .asset-label-3d {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: rgba(0, 255, 255, 0.35);
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
  }

  .price-axis-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 6px;
    color: rgba(0, 255, 255, 0.35);
    pointer-events: none;
    white-space: nowrap;
  }

  .time-label-3d {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(0, 255, 255, 0.3);
    pointer-events: none;
    white-space: nowrap;
  }

  #view-controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 6px;
  }

  #view-controls button {
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(0, 255, 255, 0.2);
    color: rgba(0, 255, 255, 0.5);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  #view-controls button:hover {
    background: rgba(0, 255, 255, 0.1);
    border-color: rgba(0, 255, 255, 0.5);
    color: #00ffff;
  }

  #view-controls button.active {
    background: rgba(0, 255, 255, 0.15);
    border-color: #00ffff;
    color: #00ffff;
    box-shadow: 0 0 8px rgba(0, 255, 255, 0.15);
  }

  #view-controls button svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  #countdown {
    position: fixed;
    bottom: 20px;
    right: 220px;
    z-index: 100;
    font-family: 'Orbitron', sans-serif;
    text-align: right;
    pointer-events: none;
  }

  #countdown .cd-label {
    font-size: 9px;
    font-weight: 400;
    color: rgba(0, 255, 255, 0.2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
    font-family: 'Share Tech Mono', monospace;
  }

  #countdown .cd-time {
    font-size: 22px;
    font-weight: 700;
    color: rgba(0, 255, 255, 0.25);
    text-shadow: 0 0 12px rgba(0, 255, 255, 0.08);
    letter-spacing: 3px;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-text" id="loadingText">LOADING BTC DATA...</div>
</div>

<div id="header">
  <div class="logo">3D BTC</div>
  <div class="asset-selector" id="assetSelector">
    <button class="asset-selector-btn" id="assetSelectorBtn">
      <span id="selectedSymbol">BTC/USDT</span>
      <span class="arrow">&#9660;</span>
    </button>
    <div class="asset-dropdown" id="assetDropdown">
      <input type="text" id="assetSearch" placeholder="Search pair..." autocomplete="off">
      <div class="asset-list" id="assetList"></div>
    </div>
  </div>
  <div class="price-ticker">
    <span class="price" id="currentPrice">--</span>
    <span class="change up" id="priceChange">--</span>
  </div>
  <div class="timeframe-selector">
    <button data-interval="1m">1m</button>
    <button data-interval="5m">5m</button>
    <button data-interval="15m">15m</button>
    <button data-interval="1h" class="active">1h</button>
    <button data-interval="4h">4h</button>
    <button data-interval="1d">1d</button>
  </div>
</div>

<div id="sidebar">
  <div class="stats-panel">
    <div class="stats-title">24H STATS</div>
    <div class="stat-row"><span class="stat-label">HIGH</span><span class="stat-val green" id="stat24hHigh">--</span></div>
    <div class="stat-row"><span class="stat-label">LOW</span><span class="stat-val red" id="stat24hLow">--</span></div>
    <div class="stat-row"><span class="stat-label">CHANGE</span><span class="stat-val" id="stat24hChange">--</span></div>
    <div class="stat-row"><span class="stat-label">VOL BASE</span><span class="stat-val cyan" id="stat24hVol">--</span></div>
    <div class="stat-row"><span class="stat-label">VOL USDT</span><span class="stat-val cyan" id="stat24hVolQ">--</span></div>
    <div class="stat-row"><span class="stat-label">TRADES</span><span class="stat-val" id="stat24hTrades">--</span></div>
    <div class="stat-row"><span class="stat-label">VWAP</span><span class="stat-val" id="stat24hVwap">--</span></div>
  </div>
  <div class="spread-panel">
    <div class="stats-title">SPREAD</div>
    <div class="stat-row"><span class="stat-label">BID</span><span class="stat-val green" id="spreadBid">--</span></div>
    <div class="stat-row"><span class="stat-label">ASK</span><span class="stat-val red" id="spreadAsk">--</span></div>
    <div class="stat-row"><span class="stat-label">SPREAD</span><span class="stat-val cyan" id="spreadVal">--</span></div>
    <div class="spread-bar"><div class="spread-fill" id="spreadFill"></div></div>
  </div>
</div>


<div id="canvas-container"></div>

<div id="indicator-overlay">
  <span class="ind-ema">EMA 55</span> <span class="ind-value" id="emaCurrentVal">--</span>
</div>

<div class="controls-hint">
  LMB: Rotate &middot; Space+Mouse: Pan &middot; Scroll: Zoom
</div>

<div id="view-controls">
  <button id="btnCenter" title="Center view">
    <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
    Center
  </button>
  <button id="btnLock" title="Lock view (disable rotation)">
    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
    Lock
  </button>
</div>

<div id="countdown">
  <div class="cd-label">next candle</div>
  <div class="cd-time" id="cdTime">--:--</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ─── Crypto Pairs ───
const CRYPTO_PAIRS = [
  { symbol: 'BTCUSDT', base: 'BTC', name: 'Bitcoin' },
  { symbol: 'ETHUSDT', base: 'ETH', name: 'Ethereum' },
  { symbol: 'SOLUSDT', base: 'SOL', name: 'Solana' },
  { symbol: 'BNBUSDT', base: 'BNB', name: 'BNB' },
  { symbol: 'XRPUSDT', base: 'XRP', name: 'XRP' },
  { symbol: 'DOGEUSDT', base: 'DOGE', name: 'Dogecoin' },
  { symbol: 'ADAUSDT', base: 'ADA', name: 'Cardano' },
  { symbol: 'AVAXUSDT', base: 'AVAX', name: 'Avalanche' },
  { symbol: 'DOTUSDT', base: 'DOT', name: 'Polkadot' },
  { symbol: 'LINKUSDT', base: 'LINK', name: 'Chainlink' },
  { symbol: 'MATICUSDT', base: 'MATIC', name: 'Polygon' },
  { symbol: 'LTCUSDT', base: 'LTC', name: 'Litecoin' },
];

// ─── State ───
let currentSymbol = CRYPTO_PAIRS[0];
let currentInterval = '1h';
let candleData = [];
let candleMeshes = [];
let refreshTimer = null;
let scene, camera, renderer, composer, controls;
let labelRenderer;
let candleGroup, gridGroup, floorMesh, particleSystem;
let lastPriceLabel = null;
let hoverLabel = null;
let raycaster, mouse;
let hoveredIndex = -1;
let isLocked = false;
let defaultCamPos = new THREE.Vector3(80, 55, 90);
let defaultTarget = new THREE.Vector3(50, 10, 0);
let ws = null;
let livePrice = null;
let normParams = null; // { minPrice, priceRange, maxVol, PRICE_SCALE, VOLUME_SCALE }
let emaMesh = null;
let emaValues = [];
let tradeParticles = [];
let tradeParticleSystem = null;
let tradeParticleGeo = null;
const MAX_TRADE_PARTICLES = 300;

const CANDLE_SPACING = 1.2;
const EMA_PERIOD = 55;
const EMA_COLOR = 0xff8800;
const VISIBLE_CANDLES = 100;
const FETCH_CANDLES = VISIBLE_CANDLES + EMA_PERIOD;
const GREEN = 0x00ff88;
const RED = 0xff0044;
const CYAN = 0x00ffff;

// ─── Interval durations (ms) ───
const INTERVAL_MS = {
  '1m': 60 * 1000,
  '5m': 5 * 60 * 1000,
  '15m': 15 * 60 * 1000,
  '1h': 60 * 60 * 1000,
  '4h': 4 * 60 * 60 * 1000,
  '1d': 24 * 60 * 60 * 1000,
};

// ─── Init ───
initScene();
initLabelRenderer();
initPostProcessing();
initFloor();
initParticles();
initTradeParticles();
initControls();
initRaycaster();
bindUI();
initWebSocket();
fetchAndRender();
animate();

// ─── Three.js Scene Setup ───
function initScene() {
  const container = document.getElementById('canvas-container');

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a0f, 0.008);

function initFloor() {
  // Create grid texture via canvas
  const size = 2048;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, size, size);

  const gridStep = size / 40;
  ctx.strokeStyle = 'rgba(0, 255, 255, 0.12)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 40; i++) {
    const pos = i * gridStep;
    ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(size, pos); ctx.stroke();
  }

  // Brighter center lines every 10
  ctx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i <= 40; i += 10) {
    const pos = i * gridStep;
    ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(size, pos); ctx.stroke();
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(3, 3);

  const floorGeo = new THREE.PlaneGeometry(300, 300);
  const floorMat = new THREE.MeshStandardMaterial({
    map: texture,
    transparent: true,
    opacity: 0.9,
    metalness: 0.8,
    roughness: 0.3,
  });

  floorMesh = new THREE.Mesh(floorGeo, floorMat);
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.set(60, -0.1, 0);
  scene.add(floorMesh);
}

function formatTimeLabel(timestamp) {
  const d = new Date(timestamp);
  const pad = n => String(n).padStart(2, '0');
  const month = pad(d.getMonth() + 1);
  const day = pad(d.getDate());
  const hours = pad(d.getHours());
  const mins = pad(d.getMinutes());

  // For daily candles, show only date
  if (currentInterval === '1d') return `${month}/${day}`;
  // For 4h, show date + hour
  if (currentInterval === '4h') return `${month}/${day} ${hours}h`;
  // Otherwise show time
  return `${hours}:${mins}`;
}

function getCenterX() {
  if (!candleData.length) return 50;
  const lastX = (candleData.length - 1) * CANDLE_SPACING;
  // Bias 65% toward the last candle
  return lastX * 0.65;
}

function centerCamera() {
  if (!candleData.length) return;
  const cx = getCenterX();
  const target = new THREE.Vector3(cx, 40 / 4, 0);
  const camPos = new THREE.Vector3(cx + 50, 50, 120);

  // Smooth transition
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const duration = 600;
  const startTime = Date.now();

  function animateCenter() {
    const elapsed = Date.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic

    camera.position.lerpVectors(startPos, camPos, ease);
    controls.target.lerpVectors(startTarget, target, ease);

    if (t < 1) requestAnimationFrame(animateCenter);
  }
  animateCenter();
}

function formatVolume(vol, unit = '') {
  const suffix = unit ? ' ' + unit : '';
  if (vol >= 1e9) return (vol / 1e9).toFixed(2) + 'B' + suffix;
  if (vol >= 1e6) return (vol / 1e6).toFixed(2) + 'M' + suffix;
  if (vol >= 1e3) return (vol / 1e3).toFixed(1) + 'K' + suffix;
  return vol.toFixed(0) + suffix;
}

function formatPrice(p) {
  return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDateTime(timestamp) {
  const d = new Date(timestamp);
  const pad = n => String(n).padStart(2, '0');
  const year = d.getFullYear();
  const month = pad(d.getMonth() + 1);
  const day = pad(d.getDate());
  const hours = pad(d.getHours());
  const mins = pad(d.getMinutes());
  if (currentInterval === '1d') return `${year}-${month}-${day}`;
  return `${year}-${month}-${day} ${hours}:${mins}`;
}

function updateEMAOverlay(index) {
  const el = document.getElementById('emaCurrentVal');

  } else if (emaValues.length > 0) {
    // Show last EMA value by default
    const last = emaValues[emaValues.length - 1];
    el.textContent = last !== undefined ? formatPrice(last) : '--';
  } else {
    el.textContent = '--';
  }
}

function updateHoverLabel() {
  if (!candleMeshes.length) return;

  raycaster.setFromCamera(mouse, camera);

  // Collect all body meshes for raycasting
  const bodyMeshes = candleMeshes.map(m => m.body);
  const wickMeshes = candleMeshes.map(m => m.wick);
  const allTargets = [...bodyMeshes, ...wickMeshes];
  const intersects = raycaster.intersectObjects(allTargets);

  let newIndex = -1;

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    // Find which candle index this belongs to
    for (let i = 0; i < candleMeshes.length; i++) {
      if (hit === candleMeshes[i].body || hit === candleMeshes[i].wick) {
        newIndex = i;
        break;
      }
    }
  }

  if (newIndex === hoveredIndex) return;
  hoveredIndex = newIndex;

  // Remove old hover label
  if (hoverLabel) {
    hoverLabel.parent?.remove(hoverLabel);
    hoverLabel = null;
  }

  // Update EMA overlay even when not hovering a valid candle
  if (newIndex < 0) {
    updateEMAOverlay(-1);
    return;
  }

  // Update EMA overlay with hovered candle's EMA
  updateEMAOverlay(newIndex);

  // Don't show hover tooltip on last candle (it already has the permanent label)
  if (newIndex === candleData.length - 1) return;

  const c = candleData[newIndex];
  const mesh = candleMeshes[newIndex].body;
  const isGreen = c.close >= c.open;
  const colorClass = isGreen ? 'green' : 'red';

  const div = document.createElement('div');
  div.className = 'price-label-3d hover';
  div.innerHTML = `
    <div class="label-row" style="margin-bottom:4px">
      <span class="label-key" style="color:rgba(255,255,255,0.55)">${formatDateTime(c.time)}</span>
    </div>
    <div class="label-row">
      <span class="label-key">O</span><span class="label-val ${colorClass}">${formatPrice(c.open)}</span>
      <span class="label-key">H</span><span class="label-val ${colorClass}">${formatPrice(c.high)}</span>
    </div>
    <div class="label-row">
      <span class="label-key">L</span><span class="label-val ${colorClass}">${formatPrice(c.low)}</span>
      <span class="label-key">C</span><span class="label-val ${colorClass}">${formatPrice(c.close)}</span>
    </div>
    <div class="label-row">
      <span class="label-key">VOL</span><span class="label-vol">${formatVolume(c.volume, currentSymbol.base)}</span>
    </div>
    <div class="label-row">
      <span class="label-key">VOL$</span><span class="label-vol">$${formatVolume(c.quoteVolume, 'USDT')}</span>
    </div>
  `;

  hoverLabel = new CSS2DObject(div);
  hoverLabel.position.set(0, mesh.geometry.parameters.height / 2 + 1.5, 0);
  mesh.add(hoverLabel);
}

function updateCountdown() {
  const el = document.getElementById('cdTime');
  const intervalMs = INTERVAL_MS[currentInterval] || 60000;
  const now = Date.now();
  const remaining = intervalMs - (now % intervalMs);

  const totalSec = Math.floor(remaining / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;

  const pad = n => String(n).padStart(2, '0');

  if (h > 0) {
    el.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
  } else {
    el.textContent = `${pad(m)}:${pad(s)}`;
  }
}

// ─── WebSocket real-time price ───
function initWebSocket() {
  if (ws) { ws.close(); ws = null; }

  const sym = currentSymbol.symbol.toLowerCase();
  ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${sym}@trade/${sym}@ticker/${sym}@bookTicker/${sym}@aggTrade`);

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    const { stream, data } = msg;
    if (stream.endsWith('@trade')) {
      livePrice = parseFloat(data.p);
      updateLivePrice();
    } else if (stream.endsWith('@ticker')) {
      updateTickerStats(data);
    } else if (stream.endsWith('@bookTicker')) {
      updateSpread(data);
    } else if (stream.endsWith('@aggTrade')) {
      spawnTradeParticles(data);
    }
  };

  ws.onclose = () => {
    // Reconnect after 3s
    setTimeout(initWebSocket, 3000);
  };

  ws.onerror = () => { ws.close(); };
}

// ─── Trade Particles ───
function initTradeParticles() {
  tradeParticleGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(MAX_TRADE_PARTICLES * 3);
  const colors = new Float32Array(MAX_TRADE_PARTICLES * 3);

  // Initialize all hidden
  for (let i = 0; i < MAX_TRADE_PARTICLES; i++) {
    positions[i * 3 + 1] = -1000;
  }

  tradeParticleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  tradeParticleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 1.5,
    vertexColors: true,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
  });

  tradeParticleSystem = new THREE.Points(tradeParticleGeo, mat);
  tradeParticleSystem.frustumCulled = false;
  scene.add(tradeParticleSystem);
}

function spawnTradeParticles(data) {
  if (!normParams || !candleData.length) return;

  const price = parseFloat(data.p);
  const qty = parseFloat(data.q);
  const isSeller = data.m; // true = seller (maker), false = buyer

  const { minPrice, priceRange, PRICE_SCALE } = normParams;
  const lastX = (candleData.length - 1) * CANDLE_SPACING;
  const y = (price - minPrice) / priceRange * PRICE_SCALE;

  // Number of particles proportional to log of volume
  const quoteVol = price * qty;
  const count = Math.min(15, Math.max(1, Math.floor(Math.log10(quoteVol + 1) * 2)));

  // Whale detection: dynamic threshold based on recent average
  const isWhale = quoteVol > 50000;
  const baseSize = isWhale ? 4.0 : 1.8;

  const r = isSeller ? 1.0 : 0.0;
  const g = isSeller ? 0.0 : 1.0;
  const b = isSeller ? 0.27 : 0.53;

  for (let i = 0; i < count; i++) {
    if (tradeParticles.length >= MAX_TRADE_PARTICLES) {
      tradeParticles.shift(); // Remove oldest
    }

    // Random velocity on a sphere
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    const speed = 0.3 + Math.random() * 0.5;
    const vx = Math.sin(phi) * Math.cos(theta) * speed;
    const vy = Math.sin(phi) * Math.sin(theta) * speed * 0.7 + 0.15; // slight upward bias
    const vz = Math.cos(phi) * speed;

    tradeParticles.push({
      x: lastX + (Math.random() - 0.5) * 0.5,
      y: y + (Math.random() - 0.5) * 0.5,
      z: (Math.random() - 0.5) * 1.5,
      vx, vy, vz,
      r, g, b,
      life: 1.5 + Math.random() * 1.5,
      maxLife: 1.5 + Math.random() * 1.5,
      size: baseSize + Math.random() * 0.2,
    });
  }
}

function updateTradeParticles(dt) {
  const positions = tradeParticleGeo.attributes.position.array;
  const colors = tradeParticleGeo.attributes.color.array;

  // Update existing particles
  for (let i = tradeParticles.length - 1; i >= 0; i--) {
    const p = tradeParticles[i];
    p.life -= dt;
    if (p.life <= 0) {
      tradeParticles.splice(i, 1);
      continue;
    }

    // Apply velocity and gravity
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.z += p.vz * dt;
    p.vy -= 0.3 * dt; // gravity

    // Damping
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.vz *= 0.98;
  }

  // Write to buffers
  for (let i = 0; i < MAX_TRADE_PARTICLES; i++) {
    if (i < tradeParticles.length) {
      const p = tradeParticles[i];
      const lifeRatio = p.life / p.maxLife;
      // Fade out in last 30% of life
      const alpha = lifeRatio < 0.3 ? lifeRatio / 0.3 : 1.0;

      positions[i * 3] = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;
      colors[i * 3] = p.r * alpha;
      colors[i * 3 + 1] = p.g * alpha;
      colors[i * 3 + 2] = p.b * alpha;
    } else {
      positions[i * 3] = 0;
      positions[i * 3 + 1] = -1000;
      positions[i * 3 + 2] = 0;
      colors[i * 3] = 0;
      colors[i * 3 + 1] = 0;
      colors[i * 3 + 2] = 0;
    }
  }

  tradeParticleGeo.attributes.position.needsUpdate = true;
  tradeParticleGeo.attributes.color.needsUpdate = true;
}

function updateLivePrice() {
  if (livePrice === null || !candleData.length) return;

  const priceEl = document.getElementById('currentPrice');
  const changeEl = document.getElementById('priceChange');
  const first = candleData[0];

  const pctChange = ((livePrice - first.open) / first.open * 100);
  const isUp = pctChange >= 0;

  priceEl.textContent = '$' + livePrice.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  priceEl.className = 'price' + (isUp ? '' : ' down');

  changeEl.textContent = (isUp ? '+' : '') + pctChange.toFixed(2) + '%';
  changeEl.className = 'change ' + (isUp ? 'up' : 'down');

  // Update last candle label with live price
  if (lastPriceLabel && lastPriceLabel.element) {
    const priceDiv = lastPriceLabel.element.querySelector('.label-price');
    if (priceDiv) priceDiv.textContent = formatPrice(livePrice);
  }

  // Update last candle geometry
  updateLastCandleGeometry();
}

function updateLastCandleGeometry() {
  if (!normParams || !candleData.length || !candleMeshes.length || livePrice === null) return;

  const lastIdx = candleMeshes.length - 1;
  const { body, wick } = candleMeshes[lastIdx];
  const c = candleData[lastIdx];
  const { minPrice, priceRange, PRICE_SCALE } = normParams;

  // Update candle data with live price
  const prevClose = c.close;
  c.close = livePrice;
  if (livePrice > c.high) c.high = livePrice;
  if (livePrice < c.low) c.low = livePrice;

  const isGreen = c.close >= c.open;
  const color = isGreen ? GREEN : RED;

  // Rebuild body
  const bodyH = Math.max(Math.abs(c.close - c.open) / priceRange * PRICE_SCALE, 0.15);
  const bodyBottom = (Math.min(c.open, c.close) - minPrice) / priceRange * PRICE_SCALE;

  body.geometry.dispose();
  body.geometry = new THREE.BoxGeometry(0.7, bodyH, body.geometry.parameters.depth);
  body.position.y = bodyBottom + bodyH / 2;
  body.material.color.setHex(color);
  body.material.emissive.setHex(color);

  // Rebuild wick
  const wickH = (c.high - c.low) / priceRange * PRICE_SCALE;
  const wickBottom = (c.low - minPrice) / priceRange * PRICE_SCALE;

  wick.geometry.dispose();
  wick.geometry = new THREE.BoxGeometry(0.08, Math.max(wickH, 0.1), 0.08);
  wick.position.y = wickBottom + wickH / 2;
  wick.material.color.setHex(color);
  wick.material.emissive.setHex(color);

  // Update label position
  if (lastPriceLabel) {
    lastPriceLabel.position.set(7, bodyH / 2 + 0.5, 0);
  }

  // Update last EMA value with live price and rebuild rope
  if (emaValues.length >= 2) {
    const k = 2 / (EMA_PERIOD + 1);
    const prevEma = emaValues[emaValues.length - 2];
    if (prevEma !== undefined) {
      emaValues[emaValues.length - 1] = livePrice * k + prevEma * (1 - k);
    }
  }
  buildEMARope();
  if (hoveredIndex < 0) updateEMAOverlay(-1);
}

// ─── UI Binding ───
function bindUI() {
  document.querySelectorAll('.timeframe-selector button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.timeframe-selector .active')?.classList.remove('active');
      btn.classList.add('active');
      currentInterval = btn.dataset.interval;
      fetchAndRender();
    });
  });

  document.getElementById('btnCenter').addEventListener('click', centerCamera);
  document.getElementById('btnLock').addEventListener('click', toggleLock);

  // ─── Asset Selector ───
  initAssetSelector();
}

function initAssetSelector() {
  const selector = document.getElementById('assetSelector');
  const btn = document.getElementById('assetSelectorBtn');
  const dropdown = document.getElementById('assetDropdown');
  const searchInput = document.getElementById('assetSearch');
  const listEl = document.getElementById('assetList');

  function renderList(filter = '') {
    const q = filter.toLowerCase();
    listEl.innerHTML = '';
    CRYPTO_PAIRS.forEach(pair => {
      if (q && !pair.base.toLowerCase().includes(q) && !pair.name.toLowerCase().includes(q) && !pair.symbol.toLowerCase().includes(q)) return;
      const item = document.createElement('div');
      item.className = 'asset-item' + (pair.symbol === currentSymbol.symbol ? ' active' : '');
      item.innerHTML = `<span class="pair-symbol">${pair.base}</span><span class="pair-name">${pair.name}</span>`;
      item.addEventListener('click', () => switchSymbol(pair));
      listEl.appendChild(item);
    });
  }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    selector.classList.toggle('open');
    if (selector.classList.contains('open')) {
      searchInput.value = '';
      renderList();
      searchInput.focus();
    }
  });

  searchInput.addEventListener('input', () => renderList(searchInput.value));
  searchInput.addEventListener('click', (e) => e.stopPropagation());

  document.addEventListener('click', () => selector.classList.remove('open'));
  dropdown.addEventListener('click', (e) => e.stopPropagation());

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') selector.classList.remove('open');
  });

  renderList();
}

function switchSymbol(pair) {
  if (pair.symbol === currentSymbol.symbol) {
    document.getElementById('assetSelector').classList.remove('open');
    return;
  }
  currentSymbol = pair;

  // Update UI text
  document.getElementById('selectedSymbol').textContent = `${pair.base}/USDT`;
  document.querySelector('.logo').textContent = `3D ${pair.base}`;
  document.title = `3D ${pair.base} Visualizer`;
  document.getElementById('loadingText').textContent = `LOADING ${pair.base} DATA...`;

  // Show loading
  document.getElementById('loading').classList.remove('hidden');

  // Close dropdown
  document.getElementById('assetSelector').classList.remove('open');

  // Reset live price and panels
  livePrice = null;
  tradeParticles = [];
  document.getElementById('currentPrice').textContent = '--';
  document.getElementById('priceChange').textContent = '--';
  document.getElementById('stat24hHigh').textContent = '--';
  document.getElementById('stat24hLow').textContent = '--';
  document.getElementById('stat24hChange').textContent = '--';
  document.getElementById('stat24hChange').className = 'stat-val';
  document.getElementById('stat24hVol').textContent = '--';
  document.getElementById('stat24hVolQ').textContent = '--';
  document.getElementById('stat24hTrades').textContent = '--';
  document.getElementById('stat24hVwap').textContent = '--';
  document.getElementById('spreadBid').textContent = '--';
  document.getElementById('spreadAsk').textContent = '--';
  document.getElementById('spreadVal').textContent = '--';
  document.getElementById('spreadFill').style.width = '50%';

  // Reconnect WebSocket
  initWebSocket();

  // Fetch new data
  fetchAndRender();
}

// ─── Data Fetching ───
function scheduleNextRefresh() {
  clearTimeout(refreshTimer);
  const intervalMs = INTERVAL_MS[currentInterval] || 60000;
  const now = Date.now();
  // Time until next candle closes + 1.5s buffer for Binance to finalize
  const msUntilNextClose = intervalMs - (now % intervalMs) + 1500;
  refreshTimer = setTimeout(fetchAndRender, msUntilNextClose);
}

async function fetchAndRender() {
  clearTimeout(refreshTimer);

  try {
    const url = `https://api.binance.com/api/v3/klines?symbol=${currentSymbol.symbol}&interval=${currentInterval}&limit=${FETCH_CANDLES}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const raw = await resp.json();

    // k[5] = volume in base asset (BTC), k[7] = quote volume (USDT)
    const allCandles = raw.map(k => ({
      time: k[0],
      closeTime: k[6],
      open: parseFloat(k[1]),
      high: parseFloat(k[2]),
      low: parseFloat(k[3]),
      close: parseFloat(k[4]),
      volume: parseFloat(k[5]),
      quoteVolume: parseFloat(k[7]),
    }));

    // Calculate EMA on full dataset, then trim to visible candles
    emaValues = calcEMA(allCandles, EMA_PERIOD);
    // Keep only the last VISIBLE_CANDLES for display, along with their EMA values
    const trimStart = Math.max(0, allCandles.length - VISIBLE_CANDLES);
    candleData = allCandles.slice(trimStart);
    emaValues = emaValues.slice(trimStart);

    updatePrice();
    buildCandles();
    document.getElementById('loading').classList.add('hidden');
  } catch (err) {
    console.error('Fetch error:', err);
  }

  scheduleNextRefresh();
}

function updatePrice() {
  if (!candleData.length) return;
  const last = candleData[candleData.length - 1];
  const first = candleData[0];
  const priceEl = document.getElementById('currentPrice');
  const changeEl = document.getElementById('priceChange');

  const price = last.close;
  const pctChange = ((last.close - first.open) / first.open * 100);
  const isUp = pctChange >= 0;

  priceEl.textContent = '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  priceEl.className = 'price' + (isUp ? '' : ' down');

  changeEl.textContent = (isUp ? '+' : '') + pctChange.toFixed(2) + '%';
  changeEl.className = 'change ' + (isUp ? 'up' : 'down');
}

// ─── Build 3D Grid ───
function buildGrid(xMax, yMax, zMax, minPrice, priceRange) {
  // Clear old grid
  while (gridGroup.children.length) {
    const child = gridGroup.children[0];
    child.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) obj.material.dispose();
    });
    gridGroup.remove(child);
  }

  const gridMat = new THREE.LineBasicMaterial({
    color: CYAN,
    transparent: true,
    opacity: 0.12,
    depthWrite: false,
  });

  const accentMat = new THREE.LineBasicMaterial({
    color: CYAN,
    transparent: true,
    opacity: 0.25,
    depthWrite: false,
  });

  const yBottom = -6;
  const zMin = -2;
  const xMin = -2;

  // Horizontal lines along X at each Y level (price grid) — on back wall (z=zMin)
  const ySteps = 8;
  const yStep = (yMax - yBottom) / ySteps;
  for (let i = 0; i <= ySteps; i++) {
    const y = yBottom + i * yStep;
    const mat = (i === 0 || i === ySteps) ? accentMat : gridMat;

    // Back wall line (along X)
    const pts1 = [new THREE.Vector3(xMin, y, zMin), new THREE.Vector3(xMax, y, zMin)];
    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts1), mat));

    // Side wall line (along Z)
    const pts2 = [new THREE.Vector3(xMin, y, zMin), new THREE.Vector3(xMin, y, zMax)];
    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2), mat));
  }

  // Vertical lines along Y at X intervals — on back wall (z=zMin)
  const xSteps = 10;
  const xStep = (xMax - xMin) / xSteps;
  for (let i = 0; i <= xSteps; i++) {
    const x = xMin + i * xStep;
    const mat = (i === 0 || i === xSteps) ? accentMat : gridMat;

    // Back wall vertical
    const pts1 = [new THREE.Vector3(x, yBottom, zMin), new THREE.Vector3(x, yMax, zMin)];
    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts1), mat));

    // Floor line (along Z)
    const pts2 = [new THREE.Vector3(x, yBottom, zMin), new THREE.Vector3(x, yBottom, zMax)];
    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2), mat));
  }

  // Depth lines along Z at Y intervals — on left wall (x=xMin)
  const zSteps = 6;
  const zStep = (zMax - zMin) / zSteps;
  for (let i = 0; i <= zSteps; i++) {
    const z = zMin + i * zStep;
    const mat = (i === 0 || i === zSteps) ? accentMat : gridMat;

    // Floor line (along X)
    const pts1 = [new THREE.Vector3(xMin, yBottom, z), new THREE.Vector3(xMax, yBottom, z)];
    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts1), mat));

    // Left wall vertical
    const pts2 = [new THREE.Vector3(xMin, yBottom, z), new THREE.Vector3(xMin, yMax, z)];
    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2), mat));
  }

  // ─── Time labels on the floor ───
  if (candleData.length > 0) {
    // Show ~10 labels evenly spaced
    const labelCount = Math.min(10, candleData.length);
    const step = Math.floor(candleData.length / labelCount);

    for (let i = 0; i < candleData.length; i += step) {
      const c = candleData[i];
      const x = i * CANDLE_SPACING;

      const div = document.createElement('div');
      div.className = 'time-label-3d';
      div.textContent = formatTimeLabel(c.time);

      const label = new CSS2DObject(div);
      label.position.set(x, yBottom - 1.2, zMax + 1);
      gridGroup.add(label);
    }

    // Always show last candle time
    const lastI = candleData.length - 1;
    if (lastI % step !== 0) {
      const div = document.createElement('div');
      div.className = 'time-label-3d';
      div.textContent = formatTimeLabel(candleData[lastI].time);

      const label = new CSS2DObject(div);
      label.position.set(lastI * CANDLE_SPACING, yBottom - 1.2, zMax + 1);
      gridGroup.add(label);
    }
  }

  // ─── Asset name on top edge of back wall ───
  const assetDiv = document.createElement('div');
  assetDiv.className = 'asset-label-3d';
  assetDiv.textContent = `${currentSymbol.base} / USDT`;
  const assetLabel = new CSS2DObject(assetDiv);
  assetLabel.position.set((xMin + xMax) / 2, yMax + 1.5, zMin);
  gridGroup.add(assetLabel);

  // ─── Price labels on Y axis (left wall) ───
  if (minPrice !== undefined && priceRange) {
    const PRICE_SCALE = yMax - 5; // matches the 40 used in buildCandles
    for (let i = 0; i <= ySteps; i++) {
      const y = yBottom + i * yStep;
      // Map Y position back to real price
      const normalizedY = (y / PRICE_SCALE);
      const price = minPrice + normalizedY * priceRange;
      if (price <= 0) continue;

      const div = document.createElement('div');
      div.className = 'price-axis-label';
      div.textContent = '$' + price.toLocaleString('en-US', { maximumFractionDigits: 0 });

      const label = new CSS2DObject(div);
      label.position.set(xMin, y, zMax + 1.5);
      gridGroup.add(label);
    }
  }
}

// ─── EMA Calculation ───
function calcEMA(data, period) {
  const closes = data.map(c => c.close);
  const k = 2 / (period + 1);
  const ema = [];

  // SMA for first value
  if (closes.length < period) return ema;
  let sum = 0;
  for (let i = 0; i < period; i++) sum += closes[i];
  ema[period - 1] = sum / period;

  for (let i = period; i < closes.length; i++) {
    ema[i] = closes[i] * k + ema[i - 1] * (1 - k);
  }

  return ema;
}

// ─── Build EMA Rope ───
function buildEMARope() {
  // Remove old
  if (emaMesh) {
    emaMesh.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) obj.material.dispose();
    });
    candleGroup.remove(emaMesh);
    emaMesh = null;
  }

  if (!normParams || !candleData.length || !emaValues.length) return;

  const { minPrice, priceRange, PRICE_SCALE } = normParams;

  // Build curve points where EMA has values
  const points = [];
  for (let i = 0; i < candleData.length; i++) {
    if (emaValues[i] === undefined) continue;
    const x = i * CANDLE_SPACING;
    const y = (emaValues[i] - minPrice) / priceRange * PRICE_SCALE;
    points.push(new THREE.Vector3(x, y, 0));
  }

  if (points.length < 2) return;

  const curve = new THREE.CatmullRomCurve3(points, false, 'catmullrom', 0.5);
  const tubeGeo = new THREE.TubeGeometry(curve, points.length * 4, 0.18, 8, false);
  const tubeMat = new THREE.MeshStandardMaterial({
    color: EMA_COLOR,
    emissive: EMA_COLOR,
    emissiveIntensity: 0.8,
    metalness: 0.4,
    roughness: 0.3,
    transparent: true,
    opacity: 0.9,
  });

  emaMesh = new THREE.Mesh(tubeGeo, tubeMat);
  candleGroup.add(emaMesh);
}

// ─── Build 3D Candles ───
function buildCandles() {
  // Clear old
  while (candleGroup.children.length) {
    const child = candleGroup.children[0];
    child.traverse(obj => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
        else obj.material.dispose();
      }
    });
    candleGroup.remove(child);
  }
  candleMeshes = [];

  if (!candleData.length) return;

  // Normalize
  const prices = candleData.flatMap(c => [c.high, c.low]);
  const minPrice = Math.min(...prices);
  const maxPrice = Math.max(...prices);
  const priceRange = maxPrice - minPrice || 1;

  const volumes = candleData.map(c => c.volume);
  const maxVol = Math.max(...volumes) || 1;

  const PRICE_SCALE = 40;
  const VOLUME_SCALE = 15;

  normParams = { minPrice, priceRange, maxVol, PRICE_SCALE, VOLUME_SCALE };

  candleData.forEach((c, i) => {
    const isGreen = c.close >= c.open;
    const color = isGreen ? GREEN : RED;
    const x = i * CANDLE_SPACING;

    // Body
    const bodyH = Math.max(Math.abs(c.close - c.open) / priceRange * PRICE_SCALE, 0.15);
    const bodyBottom = (Math.min(c.open, c.close) - minPrice) / priceRange * PRICE_SCALE;
    const depth = Math.max((c.volume / maxVol) * VOLUME_SCALE, 0.3);

    const bodyGeo = new THREE.BoxGeometry(0.7, bodyH, depth);
    const bodyMat = new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.6,
      transparent: true,
      opacity: 0.85,
      metalness: 0.3,
      roughness: 0.4,
    });
    const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
    bodyMesh.position.set(x, bodyBottom + bodyH / 2, 0);
    candleGroup.add(bodyMesh);

    // Wick
    const wickH = (c.high - c.low) / priceRange * PRICE_SCALE;
    const wickBottom = (c.low - minPrice) / priceRange * PRICE_SCALE;
    const wickGeo = new THREE.BoxGeometry(0.08, Math.max(wickH, 0.1), 0.08);
    const wickMat = new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.4,
      transparent: true,
      opacity: 0.7,
    });
    const wickMesh = new THREE.Mesh(wickGeo, wickMat);
    wickMesh.position.set(x, wickBottom + wickH / 2, 0);
    candleGroup.add(wickMesh);

    // Volume bar at base (translucent)
    const volBarH = (c.volume / maxVol) * 5;
    const volGeo = new THREE.BoxGeometry(0.9, Math.max(volBarH, 0.05), depth * 0.6);
    const volMat = new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.3 + (c.volume / maxVol) * 0.5,
      transparent: true,
      opacity: 0.25,
      metalness: 0.1,
      roughness: 0.8,
    });
    const volMesh = new THREE.Mesh(volGeo, volMat);
    volMesh.position.set(x, -volBarH / 2 - 0.5, 0);
    candleGroup.add(volMesh);

    candleMeshes.push({ body: bodyMesh, wick: wickMesh, vol: volMesh });
  });

  // Floating price label on last candle
  if (candleMeshes.length > 0) {
    const lastIdx = candleMeshes.length - 1;
    createLastPriceLabel(candleData[lastIdx], candleMeshes[lastIdx].body);
  }

  // Reset hover state
  hoveredIndex = -1;
  if (hoverLabel) {
    hoverLabel.parent?.remove(hoverLabel);
    hoverLabel = null;
  }

  // Build EMA rope
  buildEMARope();
  updateEMAOverlay(-1);

  // Build 3D grid matching data bounds
  const xMax = (candleData.length - 1) * CANDLE_SPACING + 2;
  const yMax = PRICE_SCALE + 5;
  const zMax = (VOLUME_SCALE / 2 + 2) * 3;
  buildGrid(xMax, yMax, zMax, minPrice, priceRange);

  // Center camera target biased toward last candle
  const cx = getCenterX();
  controls.target.set(cx, PRICE_SCALE / 3, 0);
}

// ─── Resize ───
function onResize() {
  const container = document.getElementById('canvas-container');
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  labelRenderer.setSize(w, h);
}

// ─── Animation Loop ───
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Float particles
  if (particleSystem) {
    const pos = particleSystem.geometry.attributes.position.array;
    for (let i = 1; i < pos.length; i += 3) {
      pos[i] += Math.sin(Date.now() * 0.0005 + i) * 0.005;
    }
    particleSystem.geometry.attributes.position.needsUpdate = true;
  }

  // Trade particles
  updateTradeParticles(1 / 60);

  // Hover detection
  updateHoverLabel();

  // Countdown
  updateCountdown();


  composer.render();
  labelRenderer.render(scene, camera);
}
